name: Build and Push Docker Images

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: kingfs/unitshub

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_type: timesfm
            platform: linux/amd64
            runner: ubuntu-latest
          - model_type: timesfm
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - model_type: chronos
            platform: linux/amd64
            runner: ubuntu-latest
          - model_type: chronos
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - model_type: kronos
            platform: linux/amd64
            runner: ubuntu-latest
          - model_type: kronos
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            MODEL_TYPE=${{ matrix.model_type }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.model_type }}
          digest="${{ steps.build.outputs.digest }}"
          safe_digest="${digest//:/_}"
          touch "/tmp/digests/${{ matrix.model_type }}/${safe_digest}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.model_type }}-${{ strategy.job-index }}
          path: /tmp/digests/${{ matrix.model_type }}/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        model_type: [timesfm, chronos, kronos]

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.model_type }}-*
          merge-multiple: true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest
        env:
          MODEL_TYPE: ${{ matrix.model_type }}
        run: |
          TAG_ARGS=""
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG_ARGS="$TAG_ARGS -t ${REGISTRY_IMAGE}:${MODEL_TYPE}-latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_ARGS="$TAG_ARGS -t ${REGISTRY_IMAGE}:${MODEL_TYPE}-${VERSION}"
          fi

          TAG_ARGS="$TAG_ARGS -t ${REGISTRY_IMAGE}:${MODEL_TYPE}-${GITHUB_SHA::7}"

          DIGEST_ARGS=""
          for d in /tmp/digests/*; do
            [ -e "$d" ] || continue
            sha="$(basename "$d")"
            sha="${sha#sha256_}"
            DIGEST_ARGS="$DIGEST_ARGS ${REGISTRY_IMAGE}@sha256:$sha"
          done

          docker buildx imagetools create $TAG_ARGS $DIGEST_ARGS

      - name: Inspect image
        env:
          MODEL_TYPE: ${{ matrix.model_type }}
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${MODEL_TYPE}-${GITHUB_SHA::7}
